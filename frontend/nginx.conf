server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Explicitly allow Vue internals ('unsafe-eval') and Reverb WebSockets (ws: wss:)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: http: https:; img-src 'self' data:;";

    # Serve Vue App (History API fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Laravel PHP-FPM
    location /api {
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        include fastcgi_params;
    }
}